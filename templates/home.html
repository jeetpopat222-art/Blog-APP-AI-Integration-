<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: #ffffff;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            width: 300px;
            text-align: center;
        }

        h1 {
            margin-bottom: 25px;
            color: #333;
        }

        a {
            display: block;
            margin: 10px 0;
            padding: 10px;
            background: #4facfe;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: 0.3s;
            font-weight: bold;
        }

        a:hover {
            background: #3a8be0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to Todo App</h1>

        <a href="/login">Login</a>
        <a href="/signup">Signup</a>
    </div>

</body>
</html>
