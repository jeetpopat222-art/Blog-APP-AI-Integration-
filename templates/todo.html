<!DOCTYPE html>
<html>
<head>
    <title>Todo Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            background: #ffffff;
            margin-top: 40px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            width: 700px;
        }

        h1 {
            text-align: center;
            margin-bottom: 5px;
            color: #333;
        }

        /* ── User badge ── */
        .user-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f0f8ff;
            border: 1px solid #d0eaff;
            border-radius: 8px;
            padding: 10px 16px;
            margin-bottom: 22px;
            font-size: 14px;
            color: #444;
        }

        .user-bar span {
            font-weight: 600;
            color: #4facfe;
        }

        .logout-btn {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            text-decoration: none;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: #cc0000;
        }

        form {
            margin-bottom: 25px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        textarea {
            height: 120px;
            resize: none;
        }

        input:focus, textarea:focus {
            border-color: #4facfe;
            box-shadow: 0 0 5px rgba(79,172,254,0.5);
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4facfe;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #3a8be0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #4facfe;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        .delete-btn {
            background: #ff4d4d;
            padding: 6px 12px;
            border-radius: 5px;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 14px;
            width: auto;
        }

        .delete-btn:hover {
            background: #cc0000;
        }

        .empty {
            text-align: center;
            color: #777;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Todo App</h1>

    <!-- ✅ User session bar -->
    <div class="user-bar">
        <div>👤 Logged in as: <span>{{ session["email"] }}</span></div>
        <a href="/logout" class="logout-btn">Logout</a>
    </div>

    <!-- Add Todo -->
    <form method="POST" action="/create_todo">
        <input type="text" name="title" placeholder="Enter title" required>
        <textarea name="desc" placeholder="Enter description" required></textarea>
        <button type="submit">Add Todo</button>
    </form>

    <!-- Todo List -->
    <table>
        <tr>
            <th>Sr No</th>
            <th>Title</th>
            <th>Description</th>
            <th>Action</th>
        </tr>

        {% if todos %}
            {% for todo in todos %}
            <tr>
                <td>{{ loop.index }}</td>
                <td>{{ todo.title }}</td>
                <td>{{ todo.desc }}</td>
                <td>
                    <form action="/delete/{{ todo.id }}" method="POST">
                        <button type="submit" class="delete-btn">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        {% else %}
            <tr>
                <td colspan="4" class="empty">No todos yet 🚀</td>
            </tr>
        {% endif %}
    </table>

</div>

</body>
</html>
